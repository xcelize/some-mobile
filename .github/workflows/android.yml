name: Android Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Create Firebase Android config
        env:
          FIREBASE_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "FIREBASE_GOOGLE_SERVICES_JSON_BASE64 secret is required"
            exit 1
          fi
          printf '%s' "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          chmod 600 android/app/google-services.json

      - name: Build web app
        run: npm run build -- --configuration production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: thermostat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
